name: KALI Sovereign Verification

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  verify:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v3
    
    - name: Set up Python 3.10
      uses: actions/setup-python@v4
      with:
        python-version: "3.10"
        
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Run Integrity Audit
      run: |
        # Initial check to ensure core manifest can be generated
        python -c "from src.core.integrity import IntegrityService; i = IntegrityService(); i.generate_signatures()"
        
    - name: Run Unit Test Suite
      run: |
        export PYTHONPATH=$PYTHONPATH:.
        pytest tests/ -v
