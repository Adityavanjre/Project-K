<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KALI SOVEREIGN | THE SINGULARITY ENGINE</title>
    <meta name="description" content="KALI Sovereign ASI Gateway. Integrated Swarm Intelligence.">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/static/css/singularity.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
</head>
<body class="bg-black text-white selection:bg-cyan-500/30">
    <!-- Minimalist Global Nav -->
    <nav class="nav-minimalist">
        <div class="flex items-center gap-4">
            <img src="/static/branding/logo.png" alt="KALI" class="h-6 w-auto opacity-80 hover:opacity-100 transition-opacity">
            <span class="text-[10px] font-mono tracking-[0.4em] text-white/20">KALI SOVEREIGN</span>
        </div>
        <div class="flex items-center">
            <div onclick="switchMode('learn')" id="nav-learn" class="nav-link active">Core</div>
            <div onclick="switchMode('gateway')" id="nav-gateway" class="nav-link">Swarm</div>
            <div onclick="switchMode('archives')" id="nav-archives" class="nav-link">Archives</div>
            <div onclick="switchMode('agent')" id="nav-agent" class="nav-link">Agent</div>
        </div>
        <div class="flex items-center gap-4">
            <div class="text-[10px] font-mono text-cyan-500/40">v5.0.1_ALPHA</div>
            <button onclick="window.location.reload()" class="text-white/20 hover:text-cyan-400 transition-colors">
                <i class="fas fa-sync-alt text-xs"></i>
            </button>
        </div>
    </nav>

    <!-- Main Content -->
    <main class="fixed inset-0 pt-[60px]">
        {% block content %}{% endblock %}
    </main>

    <!-- App Logic -->
    <script src="{{ url_for('static', filename='js/main.js') }}?v={{ range(1, 10000) | random }}"></script>

    <script>
        function switchMode(mode) {
            console.log("Switching to mode:", mode);
            // Sync UI active state
            document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
            const activeLink = document.getElementById(`nav-${mode}`);
            if (activeLink) activeLink.classList.add('active');

            if (window.app) {
                window.app.switchMode(mode);
            } else {
                window.dispatchEvent(new CustomEvent('modeChanged', { detail: { mode: mode } }));
            }
        }
    </script>
</body>
</html>
